<script type="module" src="{{ base_path }}/assets/js/main.min.js"></script>

<script>
(function() {
  var currentLang = localStorage.getItem('language') || 'en';

  function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('language', lang);
    document.documentElement.setAttribute('lang', lang);

    document.querySelectorAll('[data-en][data-zh]').forEach(function(el) {
      var enText = el.getAttribute('data-en');
      var zhText = el.getAttribute('data-zh');
      if (lang === 'zh' && zhText) {
        el.textContent = zhText;
      } else if (enText) {
        el.textContent = enText;
      }
    });

    var langText = document.getElementById('lang-text');
    if (langText) {
      langText.textContent = lang === 'zh' ? 'CN' : 'EN';
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      setLanguage(currentLang);
      var langToggle = document.getElementById('lang-toggle');
      if (langToggle) {
        langToggle.addEventListener('click', function(e) {
          e.preventDefault();
          setLanguage(currentLang === 'en' ? 'zh' : 'en');
        });
      }
    });
  } else {
    setLanguage(currentLang);
    var langToggle = document.getElementById('lang-toggle');
    if (langToggle) {
      langToggle.addEventListener('click', function(e) {
        e.preventDefault();
        setLanguage(currentLang === 'en' ? 'zh' : 'en');
      });
    }
  }
})();
</script>
