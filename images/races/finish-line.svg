<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Finish line placeholder</title>
  <desc id="desc">Stylized finish line background for race photo showcase.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6bb6ff"/>
      <stop offset="100%" stop-color="#d8edff"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f82bf"/>
      <stop offset="100%" stop-color="#1f5887"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#sky)"/>
  <rect x="0" y="520" width="1200" height="280" fill="url(#ground)"/>
  <rect x="150" y="180" width="40" height="420" fill="#2f4559"/>
  <rect x="1010" y="180" width="40" height="420" fill="#2f4559"/>
  <rect x="190" y="180" width="820" height="85" fill="#1f3345"/>
  <g>
    <rect x="250" y="200" width="80" height="45" fill="#ffffff"/>
    <rect x="330" y="200" width="80" height="45" fill="#111927"/>
    <rect x="410" y="200" width="80" height="45" fill="#ffffff"/>
    <rect x="490" y="200" width="80" height="45" fill="#111927"/>
    <rect x="570" y="200" width="80" height="45" fill="#ffffff"/>
    <rect x="650" y="200" width="80" height="45" fill="#111927"/>
    <rect x="730" y="200" width="80" height="45" fill="#ffffff"/>
    <rect x="810" y="200" width="80" height="45" fill="#111927"/>
  </g>
  <g fill="#ffffff">
    <circle cx="600" cy="470" r="14"/>
    <path d="M600 486 L600 536 M600 502 L568 518 M600 502 L630 518 M600 536 L576 572 M600 536 L624 568" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
  </g>
  <path d="M0 590 L1200 590 M0 650 L1200 650 M0 710 L1200 710" stroke="#88bee7" stroke-width="3" opacity="0.55"/>
  <text x="66" y="744" font-family="Arial, sans-serif" font-size="58" fill="#ffffff" font-weight="700">Finish Line Highlight</text>
